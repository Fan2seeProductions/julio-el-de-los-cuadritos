kind = "web"
previewPath = "/"
title = "Julio Barrios Support"
version = "1.0.0"
id = "artifacts/julio-barrios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22803

[services.development]
run = "pnpm --filter @workspace/julio-barrios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/julio-barrios", "run", "build" ]
publicDir = "artifacts/julio-barrios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22803"
BASE_PATH = "/"
